<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Snacks</title>

<!-- Add-to-Home-Screen / PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Snacks">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="apple-touch-icon.png">

<style>
  :root{
    --red:#e5484d; --green:#30a46c; --unset:#e4e4e7;
    --bg:#ffffff; --card:#f4f4f5; --text:#18181b; --muted:#71717a;
    --accent:#2563eb; --border:#e4e4e7;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --unset:#3f3f46; --bg:#000000; --card:#18181b; --text:#fafafa;
      --muted:#a1a1aa; --border:#27272a;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text);
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);
    -webkit-user-select:none; user-select:none;
  }
  #app{max-width:520px;margin:0 auto;padding:0 16px 96px;}
  h1{font-size:34px;font-weight:800;margin:18px 0 8px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

  /* Top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding-top:8px;}
  .topbar .title{font-size:18px;font-weight:700;}
  .icon-btn{font-size:22px;width:40px;height:40px;border-radius:50%;display:grid;place-items:center;}
  .icon-btn:active{background:var(--card);}

  /* Month header */
  .month-nav{display:flex;align-items:center;justify-content:space-between;margin:6px 0 10px;}
  .month-nav .m{font-size:22px;font-weight:800;}
  .month-nav button{font-size:24px;color:var(--accent);font-weight:700;width:44px;height:44px;border-radius:12px;}
  .month-nav button:active{background:var(--card);}

  /* Calendar */
  .weekdays,.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .weekdays div{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding-bottom:2px;}
  .cell{position:relative;height:50px;border-radius:9px;overflow:hidden;display:flex;}
  .cell .half{flex:1;}
  .cell .num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:14px;font-weight:700;background:rgba(255,255,255,.82);color:#18181b;
    width:26px;height:26px;border-radius:50%;display:grid;place-items:center;}
  .cell.today{box-shadow:inset 0 0 0 2.5px var(--accent);}
  .blank{height:50px;}

  /* Legend */
  .legend{margin:14px 0;display:flex;flex-direction:column;gap:8px;align-items:center;}
  .legend .row{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;font-size:12px;color:var(--muted);}
  .legend .dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:-1px;margin-right:5px;}
  .legend .who{font-weight:600;color:var(--text);}

  .sync{text-align:center;font-size:12px;color:var(--muted);margin-top:6px;min-height:16px;}
  .sync.err{color:var(--red);}

  /* Progress cards */
  .card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:16px;}
  .card h3{margin:0 0 12px;font-size:17px;}
  .mini{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .mini .mcell{height:16px;border-radius:3px;overflow:hidden;display:flex;}
  .mini .mcell .half{flex:1;}
  .mini .blank{height:16px;}
  .tallies{display:flex;gap:20px;margin-top:12px;}
  .tally .name{font-size:14px;font-weight:600;margin-bottom:4px;}
  .tally .nums{font-size:14px;display:flex;gap:12px;}
  .tally .g{color:var(--green);font-weight:600;}
  .tally .r{color:var(--red);font-weight:600;}

  /* Tab bar */
  .tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:8px;
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
    background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(12px);
    border-top:1px solid var(--border);}
  .tabbar button{display:flex;flex-direction:column;align-items:center;gap:2px;
    font-size:11px;color:var(--muted);padding:6px 22px;border-radius:14px;}
  .tabbar button .ic{font-size:20px;}
  .tabbar button.active{color:var(--accent);}

  /* Modal / sheet */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:10;
    align-items:flex-end;justify-content:center;}
  .scrim.open{display:flex;}
  .sheet{background:var(--bg);width:100%;max-width:520px;border-radius:22px 22px 0 0;
    padding:18px 18px calc(24px + env(safe-area-inset-bottom));animation:up .22s ease;}
  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet .date{text-align:center;font-size:19px;font-weight:800;margin:4px 0 18px;}
  .sheet .section-title{text-align:center;font-size:15px;font-weight:700;margin-bottom:10px;}
  .choices{display:flex;gap:12px;}
  .choice{flex:1;background:var(--card);border-radius:16px;padding:18px 8px;text-align:center;
    border:2.5px solid transparent;}
  .choice .emo{font-size:30px;}
  .choice .lab{font-size:14px;font-weight:600;margin-top:6px;}
  .choice.sel-green{border-color:var(--green);background:color-mix(in srgb,var(--green) 18%,var(--card));}
  .choice.sel-red{border-color:var(--red);background:color-mix(in srgb,var(--red) 18%,var(--card));}
  .clearbtn{display:block;margin:14px auto 0;color:var(--red);font-size:14px;font-weight:600;padding:8px;}
  .divider{height:1px;background:var(--border);margin:18px 0;}
  .partner{text-align:center;}
  .partner .pstat{font-size:18px;font-weight:700;margin-top:6px;}
  .donerow{display:flex;justify-content:flex-end;margin-top:18px;}
  .donerow button{color:var(--accent);font-weight:700;font-size:16px;padding:8px 4px;}

  /* Onboarding / settings form */
  .form{padding-top:30px;}
  .form h1{margin-bottom:4px;}
  .form p.sub{color:var(--muted);font-size:14px;margin:0 0 22px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .field input{width:100%;font-size:17px;padding:13px 14px;border-radius:12px;
    border:1px solid var(--border);background:var(--card);color:var(--text);}
  .seg{display:flex;background:var(--card);border-radius:12px;padding:4px;gap:4px;}
  .seg button{flex:1;padding:11px;border-radius:9px;font-size:15px;font-weight:600;color:var(--text);}
  .seg button.on{background:var(--accent);color:#fff;}
  .primary{width:100%;background:var(--accent);color:#fff;font-size:17px;font-weight:700;
    padding:15px;border-radius:14px;margin-top:10px;}
  .note{font-size:12px;color:var(--muted);margin-top:14px;text-align:center;line-height:1.5;}
  .hidden{display:none!important;}
</style>
</head>
<body>
<div id="app"></div>

<!-- Day editor sheet -->
<div class="scrim" id="scrim">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* ============ CONFIG (same Supabase project as the iOS app) ============ */
const SUPABASE_URL  = "https://oeskwhcdjpxpapklegpj.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lc2t3aGNkanB4cGFwa2xlZ3BqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNDc5NjgsImV4cCI6MjA5NzcyMzk2OH0.pVNWXvJLZGbcFc1XwiMXJjdkZNSV-z4ngLJffBSZeiM";

const HEADERS = {
  "apikey": SUPABASE_ANON,
  "Authorization": "Bearer " + SUPABASE_ANON,
  "Content-Type": "application/json"
};

/* ============ State ============ */
let logs = {};                       // "yyyy-mm-dd|slot" -> "had"|"none"
let view = "calendar";               // "calendar" | "progress"
let cursor = new Date();             // month being viewed
let lastSyncMsg = "";
let lastSyncErr = false;

const S = {
  get slot(){ return localStorage.getItem("mySlot") || ""; },
  set slot(v){ localStorage.setItem("mySlot", v); },
  get nameA(){ return localStorage.getItem("nameA") || "Me"; },
  set nameA(v){ localStorage.setItem("nameA", v); },
  get nameB(){ return localStorage.getItem("nameB") || "Partner"; },
  set nameB(v){ localStorage.setItem("nameB", v); },
  name(slot){ return slot === "a" ? this.nameA : this.nameB; },
  get configured(){ return this.slot === "a" || this.slot === "b"; }
};

/* ============ Date helpers ============ */
const pad = n => String(n).padStart(2,"0");
const keyOf = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const WEEKDAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function monthCells(year, month){
  const first = new Date(year, month, 1);
  const lead = (first.getDay() + 6) % 7;          // Monday-first
  const days = new Date(year, month+1, 0).getDate();
  const cells = [];
  for(let i=0;i<lead;i++) cells.push(null);
  for(let d=1; d<=days; d++) cells.push(new Date(year, month, d));
  while(cells.length % 7) cells.push(null);
  return cells;
}
function sameMonth(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth(); }
function isToday(d){ const t=new Date(); return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate(); }

/* ============ Status -> colour ============ */
function colorFor(status){
  if(status==="had")  return "var(--red)";
  if(status==="none") return "var(--green)";
  return "var(--unset)";
}
const EMOJI = { had:"🍪", none:"✅" };
const LABEL = { had:"Had a snack", none:"No snack" };

function status(day, slot){ return logs[day+"|"+slot]; }

/* ============ Networking ============ */
async function refresh(){
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/snack_logs?select=day,slot,status`, {headers:HEADERS});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const rows = await res.json();
    const map = {};
    rows.forEach(r => map[r.day+"|"+r.slot] = r.status);
    logs = map;
    lastSyncErr = false;
    lastSyncMsg = "Synced " + new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  }catch(e){
    lastSyncErr = true;
    lastSyncMsg = "Offline — " + e.message;
  }
  render();
}

async function setStatus(day, slot, newStatus){
  const k = day+"|"+slot;
  const prev = logs[k];
  if(newStatus) logs[k] = newStatus; else delete logs[k];
  render();
  try{
    let res;
    if(newStatus){
      res = await fetch(`${SUPABASE_URL}/rest/v1/snack_logs`, {
        method:"POST",
        headers:{...HEADERS, "Prefer":"resolution=merge-duplicates,return=minimal"},
        body: JSON.stringify([{day, slot, status:newStatus}])
      });
    } else {
      res = await fetch(`${SUPABASE_URL}/rest/v1/snack_logs?day=eq.${day}&slot=eq.${slot}`, {
        method:"DELETE",
        headers:{...HEADERS, "Prefer":"return=minimal"}
      });
    }
    if(!res.ok) throw new Error("HTTP "+res.status);
    lastSyncErr = false;
    lastSyncMsg = "Synced " + new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  }catch(e){
    if(prev) logs[k] = prev; else delete logs[k];   // roll back
    lastSyncErr = true;
    lastSyncMsg = "Save failed — " + e.message;
  }
  render();
}

/* ============ Rendering ============ */
const app = document.getElementById("app");

function render(){
  if(!S.configured){ renderOnboarding(); return; }
  if(view === "calendar") renderCalendar();
  else renderProgress();
  renderTabbar();
}

function renderOnboarding(){
  app.innerHTML = `
    <div class="form">
      <h1>Welcome 🍪</h1>
      <p class="sub">Set this up the same way on both phones, picking a different person on each.</p>
      <div class="field">
        <label>First person's name</label>
        <input id="ob-a" placeholder="e.g. Dima" value="${escapeAttr(S.nameA==='Me'?'':S.nameA)}">
      </div>
      <div class="field">
        <label>Second person's name</label>
        <input id="ob-b" placeholder="e.g. Anna" value="${escapeAttr(S.nameB==='Partner'?'':S.nameB)}">
      </div>
      <div class="field">
        <label>Which person is THIS phone?</label>
        <div class="seg" id="ob-seg">
          <button data-slot="a" class="on">First person</button>
          <button data-slot="b">Second person</button>
        </div>
      </div>
      <button class="primary" id="ob-start">Start</button>
    </div>`;
  let chosen = "a";
  app.querySelectorAll("#ob-seg button").forEach(b=>{
    b.onclick = ()=>{ chosen=b.dataset.slot;
      app.querySelectorAll("#ob-seg button").forEach(x=>x.classList.toggle("on", x===b)); };
  });
  // live-update segment labels with typed names
  const ai = app.querySelector("#ob-a"), bi = app.querySelector("#ob-b");
  const upd = ()=>{ const segs=app.querySelectorAll("#ob-seg button");
    segs[0].textContent = ai.value.trim() || "First person";
    segs[1].textContent = bi.value.trim() || "Second person"; };
  ai.oninput = upd; bi.oninput = upd;
  app.querySelector("#ob-start").onclick = ()=>{
    S.nameA = ai.value.trim() || "Person A";
    S.nameB = bi.value.trim() || "Person B";
    S.slot  = chosen;
    refresh();
  };
}

function renderCalendar(){
  const y = cursor.getFullYear(), m = cursor.getMonth();
  const cells = monthCells(y, m);
  const weekdayHTML = WEEKDAYS.map(w=>`<div>${w}</div>`).join("");
  const cellHTML = cells.map(d=>{
    if(!d) return `<div class="blank"></div>`;
    const k = keyOf(d);
    const a = colorFor(status(k,"a")), b = colorFor(status(k,"b"));
    return `<div class="cell ${isToday(d)?'today':''}" data-day="${k}">
      <div class="half" style="background:${a}"></div>
      <div class="half" style="background:${b}"></div>
      <div class="num">${d.getDate()}</div>
    </div>`;
  }).join("");

  const youA = S.slot==="a" ? " (you)" : "";
  const youB = S.slot==="b" ? " (you)" : "";

  app.innerHTML = `
    <div class="topbar">
      <div class="title">Snacks</div>
      <button class="icon-btn" id="settings">⚙️</button>
    </div>
    <div class="month-nav">
      <button id="prev">‹</button>
      <div class="m">${MONTHS[m]} ${y}</div>
      <button id="next">›</button>
    </div>
    <div class="weekdays">${weekdayHTML}</div>
    <div class="grid">${cellHTML}</div>
    <div class="legend">
      <div class="row">
        <span><span class="dot" style="background:var(--unset)"></span><span class="who">${escapeHtml(S.nameA)}${youA}</span> (left)</span>
        <span><span class="dot" style="background:var(--unset)"></span><span class="who">${escapeHtml(S.nameB)}${youB}</span> (right)</span>
      </div>
      <div class="row">
        <span><span class="dot" style="background:var(--green)"></span>No snack</span>
        <span><span class="dot" style="background:var(--red)"></span>Had a snack</span>
        <span><span class="dot" style="background:var(--unset)"></span>Not set</span>
      </div>
    </div>
    <div class="sync ${lastSyncErr?'err':''}">${escapeHtml(lastSyncMsg)}</div>`;

  app.querySelector("#prev").onclick = ()=>{ cursor=new Date(y,m-1,1); renderCalendar(); renderTabbar(); };
  app.querySelector("#next").onclick = ()=>{ cursor=new Date(y,m+1,1); renderCalendar(); renderTabbar(); };
  app.querySelector("#settings").onclick = openSettings;
  app.querySelectorAll(".cell").forEach(c=> c.onclick = ()=> openDay(c.dataset.day));
}

function renderProgress(){
  // months from earliest entry to current month, newest first
  const keys = Object.keys(logs);
  let start = new Date(cursor.getFullYear(), cursor.getMonth(), 1);
  if(keys.length){
    const earliest = keys.map(k=>k.split("|")[0]).sort()[0];
    const [ey,em] = earliest.split("-").map(Number);
    start = new Date(ey, em-1, 1);
  }
  const now = new Date(); const end = new Date(now.getFullYear(), now.getMonth(), 1);
  const months = [];
  let cu = new Date(start);
  while(cu <= end){ months.push(new Date(cu)); cu = new Date(cu.getFullYear(), cu.getMonth()+1, 1); }
  months.reverse();
  if(months.length===0) months.push(end);

  const cardsHTML = months.map(mo=>{
    const y=mo.getFullYear(), m=mo.getMonth();
    const cells = monthCells(y,m);
    const mini = cells.map(d=>{
      if(!d) return `<div class="blank"></div>`;
      const k=keyOf(d);
      return `<div class="mcell">
        <div class="half" style="background:${colorFor(status(k,'a'))}"></div>
        <div class="half" style="background:${colorFor(status(k,'b'))}"></div></div>`;
    }).join("");
    const t = slot=>{
      let g=0,r=0;
      cells.forEach(d=>{ if(!d||!sameMonth(d,mo))return; const s=status(keyOf(d),slot);
        if(s==="none")g++; else if(s==="had")r++; });
      const you = S.slot===slot ? " (you)" : "";
      return `<div class="tally"><div class="name">${escapeHtml(S.name(slot))}${you}</div>
        <div class="nums"><span class="g">✅ ${g}</span><span class="r">🍪 ${r}</span></div></div>`;
    };
    return `<div class="card">
      <h3>${MONTHS[m]} ${y}</h3>
      <div class="mini">${mini}</div>
      <div class="tallies">${t("a")}${t("b")}</div>
    </div>`;
  }).join("");

  app.innerHTML = `<h1>Progress</h1>${cardsHTML}
    <div class="sync ${lastSyncErr?'err':''}">${escapeHtml(lastSyncMsg)}</div>`;
}

function renderTabbar(){
  let bar = document.getElementById("tabbar");
  if(!bar){ bar = document.createElement("div"); bar.className="tabbar"; bar.id="tabbar"; document.body.appendChild(bar); }
  bar.innerHTML = `
    <button data-v="calendar" class="${view==='calendar'?'active':''}"><span class="ic">📅</span>Calendar</button>
    <button data-v="progress" class="${view==='progress'?'active':''}"><span class="ic">📊</span>Progress</button>`;
  bar.querySelectorAll("button").forEach(b=> b.onclick = ()=>{ view=b.dataset.v; refresh(); });
}

/* ============ Day editor sheet ============ */
const scrim = document.getElementById("scrim");
const sheet = document.getElementById("sheet");
scrim.onclick = e=>{ if(e.target===scrim) closeSheet(); };

function openDay(dayKey){
  const mine = S.slot;
  const other = mine==="a" ? "b" : "a";
  const d = new Date(dayKey+"T00:00:00");
  const dateStr = d.toLocaleDateString([], {weekday:"long", month:"long", day:"numeric"});
  const my = status(dayKey, mine);
  const their = status(dayKey, other);

  sheet.innerHTML = `
    <div class="date">${dateStr}</div>
    <div class="section-title">You — ${escapeHtml(S.name(mine))}</div>
    <div class="choices">
      <div class="choice ${my==='none'?'sel-green':''}" data-st="none">
        <div class="emo">✅</div><div class="lab">No snack</div></div>
      <div class="choice ${my==='had'?'sel-red':''}" data-st="had">
        <div class="emo">🍪</div><div class="lab">Had a snack</div></div>
    </div>
    ${my ? `<button class="clearbtn" id="clear">↺ Clear my entry</button>` : ``}
    <div class="divider"></div>
    <div class="partner">
      <div class="section-title" style="margin:0">${escapeHtml(S.name(other))}</div>
      ${ their
          ? `<div class="pstat" style="color:${colorFor(their)}">${EMOJI[their]} ${LABEL[their]}</div>`
          : `<div class="pstat" style="color:var(--muted);font-weight:500">No entry yet</div>` }
    </div>
    <div class="donerow"><button id="done">Done</button></div>`;

  sheet.querySelectorAll(".choice").forEach(c=>{
    c.onclick = ()=>{
      const st = c.dataset.st;
      const next = (my===st) ? null : st;   // tapping the active choice clears it
      setStatus(dayKey, mine, next).then(()=>openDay(dayKey));
    };
  });
  const clr = sheet.querySelector("#clear");
  if(clr) clr.onclick = ()=> setStatus(dayKey, mine, null).then(()=>openDay(dayKey));
  sheet.querySelector("#done").onclick = closeSheet;

  scrim.classList.add("open");
}
function closeSheet(){ scrim.classList.remove("open"); }

/* ============ Settings ============ */
function openSettings(){
  const mine = S.slot;
  sheet.innerHTML = `
    <div class="date">Settings</div>
    <div class="field"><label>${escapeHtml('First person (left)')}</label>
      <input id="set-a" value="${escapeAttr(S.nameA)}"></div>
    <div class="field"><label>${escapeHtml('Second person (right)')}</label>
      <input id="set-b" value="${escapeAttr(S.nameB)}"></div>
    <div class="field"><label>This phone is</label>
      <div class="seg" id="set-seg">
        <button data-slot="a" class="${mine==='a'?'on':''}">${escapeHtml(S.nameA)}</button>
        <button data-slot="b" class="${mine==='b'?'on':''}">${escapeHtml(S.nameB)}</button>
      </div></div>
    <button class="primary" id="set-save">Save</button>
    <div class="note">Both phones share the same data. Make sure each phone is set to a different person.</div>
    <div class="donerow"><button id="set-done">Done</button></div>`;
  let chosen = mine;
  sheet.querySelectorAll("#set-seg button").forEach(b=>{
    b.onclick=()=>{ chosen=b.dataset.slot;
      sheet.querySelectorAll("#set-seg button").forEach(x=>x.classList.toggle("on",x===b)); };
  });
  sheet.querySelector("#set-save").onclick = ()=>{
    S.nameA = sheet.querySelector("#set-a").value.trim() || "Person A";
    S.nameB = sheet.querySelector("#set-b").value.trim() || "Person B";
    S.slot  = chosen;
    closeSheet(); render();
  };
  sheet.querySelector("#set-done").onclick = closeSheet;
  scrim.classList.add("open");
}

/* ============ utils ============ */
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

/* ============ boot ============ */
render();
refresh();
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) refresh(); });
</script>
</body>
